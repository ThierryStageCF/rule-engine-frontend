<svg width="1360" height="900" viewBox="0 0 1360 900" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a1850"/>
            <stop offset="70%" stop-color="#100F38"/>
            <stop offset="100%" stop-color="#0a0926"/>
        </linearGradient>
        <radialGradient id="halo" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gridfade" cx="55%" cy="40%" r="68%">
            <stop offset="30%" stop-color="#fff" stop-opacity="1"/>
            <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
        </radialGradient>
        <mask id="gridmask">
            <rect x="0" y="0" width="1360" height="900" fill="url(#gridfade)"/>
        </mask>
        <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
            <path d="M58 0H0V58" fill="none" stroke="#ffffff" stroke-opacity="0.09" stroke-width="1.5"/>
        </pattern>
        <filter id="panelShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="40" stdDeviation="55" flood-color="#0a0926" flood-opacity="0.62"/>
        </filter>
        <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="16" stdDeviation="26" flood-color="#000000" flood-opacity="0.42"/>
        </filter>
    </defs>

    <rect width="1360" height="900" fill="none"/>

    <g filter="url(#panelShadow)">
        <rect x="70" y="72" width="1220" height="756" rx="46" fill="url(#panel)"/>
    </g>

    <g mask="url(#gridmask)">
        <rect x="70" y="72" width="1220" height="756" rx="46" fill="url(#grid)"/>
    </g>

    <!-- BOUCLIER central -->
    <g transform="translate(680,440)">
        <circle cx="0" cy="0" r="155" fill="url(#halo)"/>
        <g transform="translate(-64,-78)">
            <path d="M64 4 C64 4 104 22 118 26 C118 26 122 92 118 112 C112 140 88 158 64 168 C40 158 16 140 10 112 C6 92 10 26 10 26 C24 22 64 4 64 4 Z"
                  fill="none" stroke="#ffffff" stroke-width="7" stroke-linejoin="round" stroke-opacity="0.95"/>
            <path d="M44 84 L58 100 L86 64"
                  fill="none" stroke="#ffffff" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <text x="0" y="150" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="26" font-weight="600" fill="#ffffff" fill-opacity="0.92">Moteur de règles</text>
    </g>

    <!-- CARTE 1 : validée (haut gauche) -->
    <g transform="translate(150,150)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="360" height="190" rx="22" fill="#f6f4ee"/>
        <text x="28" y="44" font-family="Inter, sans-serif" font-size="16" letter-spacing="1.5" fill="#5c6b68">RÈGLE · OPÉRATIONS</text>
        <text x="28" y="86" font-family="Fraunces, Georgia, serif" font-size="21" fill="#12211f"><tspan fill="#100F38" font-weight="600">POUR CHAQUE</tspan> gamme</text>
        <text x="28" y="116" font-family="Fraunces, Georgia, serif" font-size="21" fill="#12211f"><tspan fill="#100F38" font-weight="600">SI</tspan> code = "B..." <tspan fill="#100F38" font-weight="600">ALORS</tspan></text>
        <text x="28" y="146" font-family="Fraunces, Georgia, serif" font-size="21" fill="#12211f">duree <tspan fill="#100F38" font-weight="600">EST RENSEIGNE</tspan></text>
        <circle cx="36" cy="170" r="6" fill="#1f9d6b"/>
        <text x="50" y="175" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#1f7a55">Validee</text>
    </g>

    <!-- CARTE 2 : non conforme (bas droite) -->
    <g transform="translate(760,600)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="410" height="190" rx="22" fill="#f6f4ee"/>
        <text x="28" y="44" font-family="Inter, sans-serif" font-size="16" letter-spacing="1.5" fill="#5c6b68">REGLE - CARACTERISTIQUES</text>
        <text x="28" y="88" font-family="Fraunces, Georgia, serif" font-size="20" fill="#12211f"><tspan fill="#100F38" font-weight="600">SI</tspan> matiere_article <tspan fill="#100F38" font-weight="600">CONTIENT</tspan> "OR"</text>
        <text x="28" y="118" font-family="Fraunces, Georgia, serif" font-size="20" fill="#12211f"><tspan fill="#100F38" font-weight="600">ALORS</tspan> poids_article &gt; 0</text>
        <circle cx="36" cy="158" r="6" fill="#d1573f"/>
        <text x="50" y="163" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#b0432f">Non conforme</text>
    </g>

</svg>